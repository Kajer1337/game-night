<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Night</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script src="app.js" defer></script>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h1>Game Night</h1>
  <input type="text" id="nickname" placeholder="Twój nick">
  <button id="joinBtn">Dołącz</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
  <h2>Gracze:</h2>
  <ul id="playerList"></ul>
  <div id="waiting">Oczekiwanie na start...</div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" style="display:none;">
    <h3>Panel Admina (Kajer)</h3>
    <input type="text" id="gameInput" placeholder="Dodaj grę">
    <div id="searchResults"></div>
    <button id="addGameBtn">Dodaj grę</button>
    <button id="startGameBtn">Zacznij grę</button>
    <h4>Pula gier:</h4>
    <ul id="gamePool"></ul>
  </div>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <div id="roundCounter"></div>
  <div id="voteCounter"></div>
  <div id="cardStack"></div>
</div>

<!-- WINNER -->
<div id="winner" style="display:none;">
  <h1 id="winnerTitle"></h1>
  <img id="winnerImg">
  <p id="winnerDesc"></p>
  <button id="nextRoundBtn">Następna runda</button>
</div>

<canvas id="confetti"></canvas>

</body>
</html>
